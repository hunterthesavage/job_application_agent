name: Build Windows Desktop Wrapper

on:
  push:
    branches:
      - codex/desktop-wrapper-spike
  workflow_dispatch:

jobs:
  build-windows-desktop:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up builder Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Install project requirements
        shell: pwsh
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Build Windows desktop package
        shell: pwsh
        run: .\scripts\build_windows_desktop.ps1

      - name: Verify packaged executable exists
        shell: pwsh
        run: |
          $exe = Join-Path $PWD "dist/windows-desktop/JobApplicationAgentDesktop/JobApplicationAgentDesktop.exe"
          if (-not (Test-Path $exe)) {
            throw "Missing packaged executable: $exe"
          }

      - name: Run packaged Windows desktop smoke
        shell: pwsh
        run: python .\scripts\run_packaged_windows_wrapper_smoke.py

      - name: Upload Windows desktop artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-wrapper
          path: |
            dist/windows-desktop/JobApplicationAgentDesktop-windows.zip
            dist/windows-desktop/JobApplicationAgentDesktop
