name: Windows Smoke Tests

on:
  push:
    branches:
      - codex/windows-smoke-tests
  workflow_dispatch:

jobs:
  python39-compat:
    name: Python 3.9 compatibility
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Compile Windows compatibility targets
        shell: pwsh
        run: |
          python -m py_compile `
            services/ui_busy.py `
            views/new_roles.py `
            views/pipeline.py `
            services/sqlite_actions.py `
            services/location_matching.py `
            src/discover_job_urls.py `
            src/validate_job_url.py

  portable-build-and-launch:
    name: Portable package launch smoke test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up builder Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Build portable package
        shell: pwsh
        run: .\scripts\build_windows_portable.ps1

      - name: Launch bundled app and wait for health check
        shell: pwsh
        run: |
          $packageRoot = Join-Path $PWD "dist/windows-portable/JobApplicationAgent"
          $appRoot = Join-Path $packageRoot "app"
          $pythonExe = Join-Path $packageRoot "python/python.exe"
          $stdoutLog = Join-Path $PWD "portable-streamlit-stdout.log"
          $stderrLog = Join-Path $PWD "portable-streamlit-stderr.log"

          $proc = Start-Process `
            -FilePath $pythonExe `
            -ArgumentList @("-m", "streamlit", "run", "app.py", "--server.headless", "true", "--server.port", "8505") `
            -WorkingDirectory $appRoot `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError $stderrLog `
            -PassThru

          try {
            $healthy = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 2
              try {
                $response = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:8505/_stcore/health" -TimeoutSec 5
                if ($response.StatusCode -eq 200) {
                  $healthy = $true
                  break
                }
              } catch {
              }
              if ($proc.HasExited) {
                break
              }
            }

            if (-not $healthy) {
              Write-Host "Portable app did not become healthy."
              if (Test-Path $stdoutLog) {
                Write-Host "--- stdout ---"
                Get-Content $stdoutLog
              }
              if (Test-Path $stderrLog) {
                Write-Host "--- stderr ---"
                Get-Content $stderrLog
              }
              throw "Portable package smoke test failed."
            }
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Upload portable package and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-artifacts
          path: |
            dist/windows-portable/JobApplicationAgent-windows-portable.zip
            portable-streamlit-stdout.log
            portable-streamlit-stderr.log
