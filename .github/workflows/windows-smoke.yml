name: Windows Smoke Tests

on:
  push:
    branches:
      - codex/windows-smoke-tests
  workflow_dispatch:

jobs:
  python39-compat:
    name: Python 3.9 compatibility
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Compile Windows compatibility targets
        shell: pwsh
        run: |
          python -m py_compile `
            services/ui_busy.py `
            views/new_roles.py `
            views/pipeline.py `
            services/sqlite_actions.py `
            services/location_matching.py `
            src/discover_job_urls.py `
            src/validate_job_url.py

  portable-build-and-launch:
    name: Portable package launch smoke test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up builder Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Build portable package
        shell: pwsh
        run: .\scripts\build_windows_portable.ps1

      - name: Verify packaged launcher files
        shell: pwsh
        run: |
          $packageRoot = Join-Path $PWD "dist/windows-portable/JobApplicationAgent"
          foreach ($required in @("INSTALL JAA.bat", "STOP JAA.bat", "app", "python")) {
            if (-not (Test-Path (Join-Path $packageRoot $required))) {
              throw "Missing packaged item: $required"
            }
          }
          $ghostFiles = Get-ChildItem -Path $packageRoot -Recurse -Force -Name | Where-Object { $_ -like "._*" }
          if ($ghostFiles) {
            throw "Unexpected ghost files were packaged: $($ghostFiles -join ', ')"
          }

      - name: Launch packaged app and wait for health check
        shell: pwsh
        run: |
          $packageRoot = Join-Path $PWD "dist/windows-portable/JobApplicationAgent"
          $appRoot = Join-Path $packageRoot "app"
          $stdoutLog = Join-Path $appRoot "logs/jaa_stdout.log"
          $stderrLog = Join-Path $appRoot "logs/jaa_stderr.log"

          Push-Location $packageRoot
          try {
            cmd /c ".\INSTALL JAA.bat"

            $healthy = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 2
              try {
                $response = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:8505/_stcore/health" -TimeoutSec 5
                if ($response.StatusCode -eq 200) {
                  $healthy = $true
                  break
                }
              } catch {
              }
            }

            if (-not $healthy) {
              Write-Host "Portable app did not become healthy."
              if (Test-Path $stdoutLog) {
                Write-Host "--- stdout ---"
                Get-Content $stdoutLog
              }
              if (Test-Path $stderrLog) {
                Write-Host "--- stderr ---"
                Get-Content $stderrLog
              }
              throw "Portable package smoke test failed."
            }
          } finally {
            cmd /c ".\STOP JAA.bat" | Out-Null
            Pop-Location
          }

      - name: Upload portable package and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-artifacts
          path: |
            dist/windows-portable/JobApplicationAgent-windows-portable.zip
            dist/windows-portable/JobApplicationAgent/app/logs/jaa_stdout.log
            dist/windows-portable/JobApplicationAgent/app/logs/jaa_stderr.log
