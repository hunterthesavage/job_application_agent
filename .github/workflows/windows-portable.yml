name: Build Windows Portable Package

on:
  workflow_dispatch:

jobs:
  build-windows-portable:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up builder Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Build portable package
        shell: pwsh
        run: .\scripts\build_windows_portable.ps1

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: job-application-agent-windows-portable
          path: dist/windows-portable/JobApplicationAgent
