name: Publish Windows Portable Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update
        required: true
        default: windows-portable-latest
      release_name:
        description: Release title shown on GitHub
        required: true
        default: Windows Portable Latest

jobs:
  publish-windows-portable:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up builder Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Build portable package
        shell: pwsh
        run: .\scripts\build_windows_portable.ps1

      - name: Publish release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.tag_name }}"
          $title = "${{ inputs.release_name }}"
          $asset = "dist/windows-portable/JobApplicationAgent-windows-portable.zip"
          $notes = @"
Portable Windows build of Job Application Agent.

How to install:
1. Download `JobApplicationAgent-windows-portable.zip` from this release.
2. Extract it.
3. Open the `JobApplicationAgent` folder.
4. Double-click `Launch Job Application Agent.bat`.
"@
          Set-Content -Path release-notes.txt -Value $notes -Encoding ASCII

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $title --notes-file release-notes.txt
          } else {
            gh release edit $tag --title $title --notes-file release-notes.txt
          }

          gh release upload $tag $asset --clobber
